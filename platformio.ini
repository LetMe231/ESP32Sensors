[platformio]
src_dir = main

; Default environment: Both sensors enabled on standard pins
[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
upload_port = COM8
monitor_port = COM8
monitor_speed = 115200
build_flags = 
    -DENABLE_AHT20=1
    -DENABLE_MAX30101=1
    -DENABLE_SGP30=0
    ; AHT20 on I2C Bus 0 (GPIO 4=SDA, 5=SCL)
    -DAHT20_I2C_PORT=0
    -DAHT20_SDA_GPIO=4
    -DAHT20_SCL_GPIO=5
    ; MAX30101 on I2C Bus 1 (GPIO 6=SDA, 7=SCL, GPIO 16=INIT)
    -DMAX30101_I2C_PORT=1
    -DMAX30101_SDA_GPIO=6
    -DMAX30101_SCL_GPIO=7
    -DMAX30101_INIT_GPIO=16

; AHT20 only: Temperature and humidity sensor
[env:esp32s3-aht20-only]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
upload_port = COM8
monitor_port = COM8
monitor_speed = 115200
build_flags = 
    -DENABLE_AHT20=1
    -DENABLE_MAX30101=0
    ; AHT20 on I2C Bus 0 (GPIO 4=SDA, 5=SCL)
    -DAHT20_I2C_PORT=0
    -DAHT20_SDA_GPIO=4
    -DAHT20_SCL_GPIO=5

; MAX30101 only: Heart rate and SpO2 sensor
[env:esp32s3-max30101-only]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
upload_port = COM8
monitor_port = COM8
monitor_speed = 115200
build_flags = 
    -DENABLE_AHT20=0
    -DENABLE_MAX30101=1
    ; MAX30101 on I2C Bus 1 (GPIO 6=SDA, 7=SCL, GPIO 16=INIT)
    -DMAX30101_I2C_PORT=1
    -DMAX30101_SDA_GPIO=6
    -DMAX30101_SCL_GPIO=7
    -DMAX30101_INIT_GPIO=16

; Custom: Template for different pin configurations
; To use: Modify the GPIO numbers below, then build with:
;   platformio run -e esp32s3-custom -t upload
[env:esp32s3-custom]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
upload_port = COM7
monitor_port = COM7
monitor_speed = 115200
build_flags = 
    -DENABLE_AHT20=0
    -DENABLE_MAX30101=0
    -DENABLE_SGP30=1
    ; SGP30 on I2C Bus 0 (GPIO 5=SDA, 4=SCL)
    -DSGP30_I2C_PORT=0
    -DSGP30_SDA_GPIO=5
    -DSGP30_SCL_GPIO=4
    -DBLE_MESH_DEVICE_NAME="\"ESP32-SGP30-Only\""
