[platformio]
src_dir = main

; ============================================================================
; Shared low-power build flags applied to every battery-node environment.
; Override any of these per-environment if needed.
; ============================================================================
[env:_lp_base]
build_flags =
    ; --- Power management ---
    ; Publish interval: 30 s instead of 2 s — major BLE TX duty-cycle reduction.
    -DSENSOR_PUBLISH_INTERVAL_S=30
    ; CPU: max 80 MHz (saves ~35 % active current vs 240 MHz default).
    -DPM_MAX_CPU_FREQ_MHZ=80
    ; CPU: min 10 MHz during FreeRTOS tickless idle / light sleep.
    -DPM_MIN_CPU_FREQ_MHZ=10
    ; Turn provisioning LED off after 60 s to save ~15 mA.
    -DPROV_LED_TIMEOUT_S=60
    ; Note: BLE Mesh relay is disabled at runtime via .relay = ESP_BLE_MESH_RELAY_DISABLED
    ; in main.c — no need to touch the Kconfig symbol here.
    -DCONFIG_BLE_MESH_SENSOR_SRV=1
    -DCONFIG_BLE_MESH_SENSOR_SERVER=1

; Default environment: AHT20 + MAX30101 on standard pins
[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
upload_port = COM8
monitor_port = COM8
monitor_speed = 115200
build_flags =
    ${env:_lp_base.build_flags}
    -DENABLE_AHT20=1
    -DENABLE_MAX30101=1
    -DENABLE_SGP30=0
    ; AHT20 on I2C Bus 0 (GPIO 4=SDA, 5=SCL)
    -DAHT20_I2C_PORT=0
    -DAHT20_SDA_GPIO=4
    -DAHT20_SCL_GPIO=5
    ; MAX30101 on I2C Bus 1 (GPIO 6=SDA, 7=SCL, GPIO 16=INIT)
    -DMAX30101_I2C_PORT=1
    -DMAX30101_SDA_GPIO=6
    -DMAX30101_SCL_GPIO=7
    -DMAX30101_INIT_GPIO=16

; AHT20 only: Temperature and humidity sensor
[env:esp32s3-aht20-only]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
upload_port = COM8
monitor_port = COM8
monitor_speed = 115200
build_flags =
    ${env:_lp_base.build_flags}
    -DENABLE_AHT20=1
    -DENABLE_MAX30101=0
    -DENABLE_SGP30=0
    ; AHT20 on I2C Bus 0 (GPIO 4=SDA, 5=SCL)
    -DAHT20_I2C_PORT=0
    -DAHT20_SDA_GPIO=4
    -DAHT20_SCL_GPIO=5

; MAX30101 only: Heart rate and SpO2 sensor
[env:esp32s3-max30101-only]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
upload_port = COM8
monitor_port = COM8
monitor_speed = 115200
build_flags =
    ${env:_lp_base.build_flags}
    -DENABLE_AHT20=0
    -DENABLE_MAX30101=1
    -DENABLE_SGP30=0
    ; MAX30101 on I2C Bus 1 (GPIO 6=SDA, 7=SCL, GPIO 16=INIT)
    -DMAX30101_I2C_PORT=1
    -DMAX30101_SDA_GPIO=6
    -DMAX30101_SCL_GPIO=7
    -DMAX30101_INIT_GPIO=16

; Custom: Template for different pin configurations
; To use: Modify the GPIO numbers below, then build with:
;   platformio run -e esp32s3-custom -t upload
[env:esp32s3-custom]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
upload_port = COM7
monitor_port = COM7
monitor_speed = 115200
build_flags =
    ${env:_lp_base.build_flags}
    -DENABLE_AHT20=0
    -DENABLE_MAX30101=0
    -DENABLE_SGP30=1
    ; SGP30 on I2C Bus 0 (GPIO 5=SDA, 4=SCL)
    -DSGP30_I2C_PORT=0
    -DSGP30_SDA_GPIO=5
    -DSGP30_SCL_GPIO=4
    -DBLE_MESH_DEVICE_NAME="\"ESP32-SGP30-Only\""

[env:esp32s3-sgp30-only]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
upload_port = COM7
monitor_port = COM7
monitor_speed = 115200
build_flags =
    ${env:_lp_base.build_flags}
    -DENABLE_AHT20=0
    -DENABLE_MAX30101=0
    -DENABLE_SGP30=1
    -DSGP30_I2C_PORT=0
    -DSGP30_SDA_GPIO=5
    -DSGP30_SCL_GPIO=4
    -DBLE_MESH_DEVICE_NAME="\"ESP32-SGP30-Only\""