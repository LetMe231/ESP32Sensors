# ============ BLE platformio.ini (continuous 5s test publish) ============
[platformio]
src_dir = main

[env:esp32s3-custom]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200

[ble_common]
build_flags =
    -DTEST_PROFILE=1
    -DTEST_ALERT_BLE_NODE_ID=1
    -DTEST_ALERT_THREAD_NODE_ID=5
    -DTEST_INITIAL_PUB_PHASE=0
    -DSENSOR_PUBLISH_INTERVAL_MS=5000

[env:ble_0_test]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
upload_port = COM7
monitor_port = COM7
monitor_speed = 115200
build_flags =
    ${ble_common.build_flags}
    -DTEST_NODE_ID=0
    -DTEST_TX_OFFSET_MS=0

[env:ble_1_test]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
upload_port = COM8
monitor_port = COM8
monitor_speed = 115200
build_flags =
    ${ble_common.build_flags}
    -DTEST_NODE_ID=1
    -DTEST_TX_OFFSET_MS=50

[env:ble_2_test]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
upload_port = COM25
monitor_port = COM25
monitor_speed = 115200
build_flags =
    ${ble_common.build_flags}
    -DTEST_NODE_ID=2
    -DTEST_TX_OFFSET_MS=100

[env:ble_3_test]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
upload_port = COM24
monitor_port = COM24
monitor_speed = 115200
build_flags =
    ${ble_common.build_flags}
    -DTEST_NODE_ID=3
    -DTEST_TX_OFFSET_MS=150

[env:ble_button_test]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
upload_port = COM25
monitor_port = COM25
monitor_speed = 115200
build_flags =
    ${ble_common.build_flags}
    -DTEST_NODE_ID=1
    -DTEST_TX_OFFSET_MS=0
    -DENABLE_BUTTON=1
    -DENABLE_LIGHT=0
    -DENABLE_BLE_RELAY=0

[env:ble_relay_test]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
upload_port = COM24
monitor_port = COM24
monitor_speed = 115200
build_flags =
    ${ble_common.build_flags}
    -DTEST_NODE_ID=2
    -DTEST_TX_OFFSET_MS=0
    -DENABLE_BUTTON=0
    -DENABLE_LIGHT=0
    -DENABLE_BLE_RELAY=1
    -DLIGHT_FEEDBACK=0